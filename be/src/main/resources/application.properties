spring.application.name=be
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.type.json_format_mapper=org.hibernate.type.format.jackson.JacksonJsonFormatMapper

# Allow larger request bodies (data URLs can be large). Adjust as needed.
# Note: this increases the maximum accepted POST size for embedded Tomcat.
server.tomcat.max-http-post-size=20971520

# Multipart upload limits (not used for JSON uploads but useful if later switching to multipart)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Keep headers size reasonable
server.max-http-header-size=8192